name: LiveLLM Prompt Runs Legacy

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Legacy manual-only prompt runner. Push-triggered docs output is owned by LiveHarness Massive Build."
        required: false
        default: "manual legacy check"

permissions:
  contents: read

concurrency:
  group: livellm-prompt-runs-legacy
  cancel-in-progress: false

jobs:
  legacy-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy prompt runner is disabled for push events
        run: |
          echo "LiveLLM Prompt Runs is now manual-only."
          echo "Use LiveHarness Massive Build for sandbox-first generation, validation, one final commit, and Pages deploy."
