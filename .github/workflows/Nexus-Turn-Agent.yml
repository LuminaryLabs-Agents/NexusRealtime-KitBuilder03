name: Nexus Turn Agent

on:
  workflow_dispatch:
    inputs:
      model:
        description: "NVIDIA-hosted model name"
        required: false
        default: "nvidia/nemotron-3-ultra-550b-a55b"
      max_goals_per_run:
        description: "Maximum queue goals to attempt in this run"
        required: false
        default: "7"
      max_turns_per_goal:
        description: "Maximum LLM turns per goal"
        required: false
        default: "6"
      max_total_turns:
        description: "Maximum total LLM turns in this run"
        required: false
        default: "30"
      run_prompt:
        description: "Optional extra instruction for this run"
        required: false
        default: "Work through the queue safely until a checkpoint is reached."
  push:
    branches:
      - main
    paths:
      - ".agent/queue.json"
      - ".agent/goal.md"
      - ".agent/workflow.md"
      - ".agent/tools.json"
      - ".agent/schemas/**"
      - "agent_tools/**"
      - ".github/workflows/Nexus-Turn-Agent.yml"

env:
  NVIDIA_SECRET_NAME: NVIDIA_API_KEY

permissions:
  contents: write

concurrency:
  group: nexus-turn-agent
  cancel-in-progress: false

jobs:
  nexus-turn-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai
      - name: Run queue worker
        env:
          NVIDIA_API_KEY: ${{ secrets[env.NVIDIA_SECRET_NAME] }}
          NVIDIA_MODEL: ${{ github.event.inputs.model }}
          MAX_GOALS_PER_RUN: ${{ github.event.inputs.max_goals_per_run }}
          MAX_TURNS_PER_GOAL: ${{ github.event.inputs.max_turns_per_goal }}
          MAX_TOTAL_TURNS: ${{ github.event.inputs.max_total_turns }}
          RUN_PROMPT: ${{ github.event.inputs.run_prompt }}
          ALLOWED_PATHS: .agent/,docs/,src/,generated/,agent_tools/
        run: python -m agent_tools.turn_agent
      - name: Run final deterministic tools
        run: python -m agent_tools.run_tools --output .agent/final-tool-results.json
      - name: Commit turn artifacts
        run: |
          git config user.name "nexus-turn-agent"
          git config user.email "nexus-turn-agent@users.noreply.github.com"
          git add .agent/ docs/ src/ generated/ agent_tools/
          if git diff --cached --quiet; then
            echo "No turn changes to commit."
            exit 0
          fi
          git commit -m "chore: run Nexus queue turn agent"
          git push
