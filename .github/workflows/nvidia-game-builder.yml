name: NVIDIA Game Builder

on:
  workflow_dispatch:
    inputs:
      game_prompt:
        description: "Prompt for the browser game"
        required: false
        default: "Build a tiny polished canvas arcade game about a living language model collecting glowing tokens inside a Git repository. Make it keyboard playable, visually clear, and self-contained."
      model:
        description: "NVIDIA-hosted model name"
        required: false
        default: "nvidia/nemotron-3-ultra-550b-a55b"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: nvidia-game-builder
  cancel-in-progress: false

jobs:
  build-game:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate strict-contract browser game and launcher
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GAME_PROMPT: ${{ github.event.inputs.game_prompt }}
          NVIDIA_MODEL: ${{ github.event.inputs.model }}
        run: |
          python <<'PY'
          from datetime import datetime, timezone
          from html import escape
          from pathlib import Path
          import json
          import os
          import re

          from openai import OpenAI

          api_key = os.environ.get("NVIDIA_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("Missing NVIDIA_API_KEY secret.")

          model = os.environ.get("NVIDIA_MODEL", "").strip() or "nvidia/nemotron-3-ultra-550b-a55b"
          game_prompt = os.environ.get("GAME_PROMPT", "").strip() or "Build a tiny polished keyboard-playable browser game about a living language model inside a GitHub Pages arcade launcher."

          contract = """
          Return exactly three blocks and nothing else:

          <index_html>
          COMPLETE_HTML_DOCUMENT_HERE
          </index_html>

          <style_css>
          COMPLETE_CSS_HERE
          </style_css>

          <game_js>
          COMPLETE_JAVASCRIPT_HERE
          </game_js>
          """.strip()

          prompt = f"""
          Build a complete small static browser game for GitHub Pages.

          User request:
          {game_prompt}

          Required output contract:
          {contract}

          Rules:
          - index_html must be a complete HTML document.
          - index_html must load ./style.css and ./game.js.
          - style_css must contain all styling.
          - game_js must contain all game logic.
          - Use Canvas 2D or plain DOM only.
          - Include keyboard controls, visible instructions, score or state, and restart behavior.
          - Do not include markdown fences or explanations.
          - Do not use remote libraries or remote assets.
          """.strip()

          client = OpenAI(base_url="https://integrate.api.nvidia.com/v1", api_key=api_key)
          completion = client.chat.completions.create(
              model=model,
              messages=[
                  {"role": "system", "content": "You generate static browser game files and obey exact tagged output contracts."},
                  {"role": "user", "content": prompt},
              ],
              temperature=0.85,
              top_p=0.95,
              max_tokens=8192,
              extra_body={"chat_template_kwargs": {"enable_thinking": True}, "reasoning_budget": 8192},
              stream=True,
          )

          parts = []
          for chunk in completion:
              if not chunk.choices:
                  continue
              delta = chunk.choices[0].delta
              if delta.content is not None:
                  print(delta.content, end="")
                  parts.append(delta.content)

          raw = "".join(parts).strip()
          if not raw:
              raise SystemExit("The model returned no content.")

          def extract(tag: str) -> str:
              matches = re.findall(rf"<{tag}>\s*(.*?)\s*</{tag}>", raw, flags=re.DOTALL | re.IGNORECASE)
              if len(matches) != 1:
                  raise SystemExit(f"Expected exactly one {tag} block, found {len(matches)}.")
              return matches[0].strip()

          index_html = extract("index_html")
          style_css = extract("style_css")
          game_js = extract("game_js")

          if "style.css" not in index_html or "game.js" not in index_html:
              raise SystemExit("index_html must reference ./style.css and ./game.js.")
          if "<html" not in index_html.lower() or "</html>" not in index_html.lower():
              raise SystemExit("index_html must be a complete HTML document.")
          if len(index_html) < 200 or len(style_css) < 50 or len(game_js) < 200:
              raise SystemExit("Generated files are too small to be accepted.")

          now = datetime.now(timezone.utc)
          stamp = now.strftime("%Y-%m-%dT%H-%M-%SZ")
          safe_model = re.sub(r"[^A-Za-z0-9_.-]+", "-", model).strip("-")
          run_id = f"{stamp}-{safe_model}"
          pages_root = "https://luminarylabs-agents.github.io/NexusLiveLLM/"
          game_url = f"{pages_root}games/{run_id}/"

          docs = Path("docs")
          run_dir = docs / "games" / run_id
          generated_history = Path("generated") / "games" / run_id
          run_dir.mkdir(parents=True, exist_ok=True)
          generated_history.mkdir(parents=True, exist_ok=True)

          for base in (run_dir, generated_history):
              (base / "index.html").write_text(index_html + "\n", encoding="utf-8")
              (base / "style.css").write_text(style_css + "\n", encoding="utf-8")
              (base / "game.js").write_text(game_js + "\n", encoding="utf-8")
              (base / "prompt.md").write_text(
                  f"# Game Prompt\n\nGenerated at: `{stamp}`\n\nModel: `{model}`\n\nURL: {game_url}\n\n## Prompt\n\n{game_prompt}\n",
                  encoding="utf-8",
              )

          manifest_path = docs / "games.json"
          if manifest_path.exists():
              try:
                  manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  manifest = []
          else:
              manifest = []

          manifest = [item for item in manifest if item.get("id") != run_id]
          manifest.insert(0, {
              "id": run_id,
              "generated_at": stamp,
              "model": model,
              "prompt": game_prompt,
              "url": f"games/{run_id}/",
          })
          manifest = manifest[:100]
          docs.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")

          cards = []
          for index, item in enumerate(manifest, start=1):
              cards.append(f'''
                <article class="game-card">
                  <div class="rank">#{index:02d}</div>
                  <div class="card-main">
                    <h2>{escape(item.get("id", "untitled"))}</h2>
                    <p class="prompt">{escape(item.get("prompt", ""))}</p>
                    <p class="meta">{escape(item.get("generated_at", ""))} · {escape(item.get("model", ""))}</p>
                    <a class="play" href="{escape(item.get("url", "#"))}">Play this build</a>
                  </div>
                </article>
              ''')

          gallery = "\n".join(cards) or "<p>No games generated yet. Run the workflow to create the first build.</p>"

          launcher_html = f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>NexusLiveLLM Game Launcher</title>
            <link rel="stylesheet" href="./launcher.css" />
          </head>
          <body>
            <main class="shell">
              <section class="hero">
                <p class="eyebrow">NexusLiveLLM</p>
                <h1>Generated Game Ladder</h1>
                <p class="lede">Every workflow run creates a new playable browser game and adds it to this ladder. The newest build stays at the top.</p>
                <a class="primary" href="games/{run_id}/">Play latest build</a>
              </section>
              <section class="ladder" aria-label="Generated game ladder">
                {gallery}
              </section>
            </main>
          </body>
          </html>
          '''

          launcher_css = '''
          :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
          * { box-sizing: border-box; }
          body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top left, #24304d, #0b0d14 45%, #05060a); color: #f5f7fb; }
          .shell { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0 72px; }
          .hero { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); border-radius: 28px; padding: 34px; box-shadow: 0 24px 80px rgba(0,0,0,.32); }
          .eyebrow { margin: 0 0 8px; color: #9fb7ff; letter-spacing: .16em; text-transform: uppercase; font-size: 12px; font-weight: 800; }
          h1 { margin: 0; font-size: clamp(38px, 7vw, 86px); line-height: .92; letter-spacing: -0.07em; }
          .lede { max-width: 720px; color: #c8d1e8; font-size: 18px; line-height: 1.55; }
          .primary, .play { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 800; border-radius: 999px; }
          .primary { margin-top: 12px; padding: 13px 18px; color: #07101f; background: #d8e6ff; }
          .ladder { display: grid; gap: 14px; margin-top: 22px; }
          .game-card { display: grid; grid-template-columns: 82px 1fr; gap: 16px; align-items: stretch; padding: 16px; border: 1px solid rgba(255,255,255,.11); background: rgba(8,10,18,.72); border-radius: 22px; }
          .rank { display: grid; place-items: center; border-radius: 18px; background: rgba(255,255,255,.08); color: #cfe0ff; font-size: 22px; font-weight: 900; }
          .card-main h2 { margin: 2px 0 8px; font-size: 18px; overflow-wrap: anywhere; }
          .prompt { margin: 0 0 10px; color: #d7def0; line-height: 1.45; }
          .meta { margin: 0 0 12px; color: #8e9bb8; font-size: 13px; overflow-wrap: anywhere; }
          .play { padding: 10px 14px; color: #edf4ff; background: rgba(125,157,255,.22); border: 1px solid rgba(190,207,255,.24); }
          @media (max-width: 640px) { .game-card { grid-template-columns: 1fr; } .rank { min-height: 52px; } .hero { padding: 24px; } }
          '''

          (docs / "index.html").write_text(launcher_html, encoding="utf-8")
          (docs / "launcher.css").write_text(launcher_css, encoding="utf-8")

          latest = Path("generated")
          latest.mkdir(exist_ok=True)
          (latest / "latest-game-url.md").write_text(f"# Latest Game URL\n\n{game_url}\n", encoding="utf-8")
          (latest / "latest-launcher-url.md").write_text(f"# Launcher URL\n\n{pages_root}\n", encoding="utf-8")
          (latest / "latest-game-run.md").write_text(
              f"# Latest Game Run\n\nGenerated at: `{stamp}`\n\nModel: `{model}`\n\nLauncher: {pages_root}\n\nGame: {game_url}\n\n## Prompt\n\n{game_prompt}\n",
              encoding="utf-8",
          )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("# NVIDIA Game Builder\n\n")
              summary.write(f"Launcher URL: {pages_root}\n\n")
              summary.write(f"Latest game URL: {game_url}\n")
          PY

      - name: Commit generated game files
        run: |
          git config user.name "nvidia-game-bot"
          git config user.email "nvidia-game-bot@users.noreply.github.com"
          git add docs/ generated/
          if git diff --cached --quiet; then
            echo "No generated game changes to commit."
            exit 0
          fi
          git commit -m "chore: generate NVIDIA browser game ladder entry"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: |
          echo "Launcher deployed to: ${{ steps.deploy.outputs.page_url }}"
