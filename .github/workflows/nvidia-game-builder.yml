name: NVIDIA Game Builder Legacy

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Legacy manual-only workflow. Public docs are owned by LiveHarness Massive Build."
        required: false
        default: "manual legacy check"

permissions:
  contents: read

concurrency:
  group: nvidia-game-builder-legacy
  cancel-in-progress: false

jobs:
  legacy-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy builder is disabled for push events
        run: |
          echo "The old NVIDIA Game Builder no longer runs on push."
          echo "Use LiveHarness Massive Build for docs/ generation and Pages deployment."
